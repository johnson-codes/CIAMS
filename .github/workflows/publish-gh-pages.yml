# Publishes ./dist to the orphan branch `gh-pages` (no deploy-pages / Pages artifact API).
# In repo Settings → Pages: set Source to "Deploy from a branch", Branch `gh-pages`, folder `/`.

name: Publish site to gh-pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: npm ci && npm run build
        env:
          VITE_BASE_PATH: /CIAMS/

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false
